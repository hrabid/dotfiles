# ~/.config/hypr/hyprsunset.conf
max-gamma = 150

profile {
    time = 7:00
    identity = true      # normal colors, no temperature shift
    gamma = 1.0
}

profile {
    time = 18:00
    temperature = 5500   # warmer in the evening
    gamma = 0.8
}

profile {
    time = 23:00
    temperature = 4000   # very warm at night
    gamma = 0.7
}
